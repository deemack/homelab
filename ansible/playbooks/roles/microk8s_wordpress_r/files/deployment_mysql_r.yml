---
apiVersion: v1
kind: Service
metadata:
  name: mysql-r
  namespace: wordpress-r
spec:
  selector:
    app: mysql-r
  ports:
  - name: mysql-r
    protocol: TCP
    port: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-r
  namespace: wordpress-r
  labels:
    app: mysql-r
spec:
  selector:
    matchLabels:
      app: mysql-r
  template:
    metadata:
      labels:
        app: mysql-r
    spec:
      containers:
      - image: mysql:8.0
        name: mysql-r
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret-r
              key: ROOT_PASSWORD
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: mysql-secret-r
              key: DATABASE
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secret-r
              key: USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret-r
              key: PASSWORD
        ports:
        - containerPort: 3306
          name: mysql-r
        volumeMounts:
        - name: mysql-persistent-storage-r
          mountPath: /var/lib/mysql
      volumes:
      - name: mysql-persistent-storage-r
        persistentVolumeClaim:
          claimName: mysql-pv-claim-r